    <style>
        /* CSS cho hiệu ứng lật thẻ 3D */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Hiệu ứng lật mượt và nảy (bouncy) tăng cảm giác thích thú */
        #card-wrapper { transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Hiệu ứng gây cấn (rung lắc nhẹ và phóng to trước khi lật) */
        #card-container { transition: transform 0.3s ease; z-index: 10; }
        .suspense-active {
            animation: suspense-shake 0.1s linear infinite;
            transform: scale(1.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes suspense-shake {
            0%, 100% { transform: translate(0, 0) scale(1.05); }
            25% { transform: translate(1px, -1px) scale(1.05); }
            50% { transform: translate(-1px, 1px) scale(1.05); }
            75% { transform: translate(-1px, -1px) scale(1.05); }
        }

        /* Hiệu ứng Icon gợi ý nổ ra rồi bay lên biến mất */
        .floating-icon {
            animation: float-fade 1.5s ease-out forwards;
            z-index: 50;
        }
        @keyframes float-fade {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -60%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(2); opacity: 0; }
        }
    </style>

        // --- HỆ THỐNG ÂM THANH (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Thuật toán tỷ lệ: 35% Đời Sống - 35% Thuộc Linh - 30% Hoạt động/Hài hước
        function getRandomCardWithProbability(availableCards) {
            const doiSongCards = availableCards.filter(c => c.category === 'Đời sống');
            const thuocLinhCards = availableCards.filter(c => c.category === 'Thuộc linh');
            const hoatDongCards = availableCards.filter(c => c.category === 'Hoạt động - Hài hước');

            const roll = Math.random() * 100;
            let pool = [];

            if (roll < 35 && doiSongCards.length > 0) pool = doiSongCards;
            else if (roll >= 35 && roll < 70 && thuocLinhCards.length > 0) pool = thuocLinhCards;
            else if (roll >= 70 && hoatDongCards.length > 0) pool = hoatDongCards;

            // Nếu vòng quay rớt vào chủ đề đã bốc hết câu hỏi, tự động chuyển qua chủ đề còn lại
            if (pool.length === 0) {
                if (doiSongCards.length > 0) pool = doiSongCards;
                else if (thuocLinhCards.length > 0) pool = thuocLinhCards;
                else if (hoatDongCards.length > 0) pool = hoatDongCards;
                else return null;
            }

            return pool[Math.floor(Math.random() * pool.length)];
        }

        async function drawRandomCard() {
            initAudio(); 
            if (isAnimating) return;

            // QUAN TRỌNG: Lọc ra các câu chưa bốc. Nếu đã bốc rồi thì sẽ loại bỏ.
            let availableCards = CARD_DATA.filter(c => !globalDrawnIds.includes(c.id));

            // Nếu đã bốc qua hết 16 câu hỏi 1 lượt
            if (availableCards.length === 0) {
                alert("Hoan hô! Nhóm đã trả lời hết sạch các câu hỏi. Chúng ta sẽ xào bài lại từ đầu nhé!");
                globalDrawnIds = [];
                if (isMultiplayer && db) {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameState', ROOM_ID);
                    await updateDoc(roomRef, { drawnIds: [] });
                }
                availableCards = CARD_DATA; // Reset bộ bài
            }

            const nextCard = getRandomCardWithProbability(availableCards);
            if (!nextCard) return;

            isAnimating = true;
            refreshIcon.classList.add('animate-spin');
            nextBtn.classList.add('opacity-50');

            const performFlipSequence = async () => {
                playClickSound(); 
                
                // Rung lắc
                cardContainer.classList.add('suspense-active');
                startSuspenseSound(); 

                if (!globalDrawnIds.includes(nextCard.id)) {
                    globalDrawnIds.push(nextCard.id);
                }
                if (isMultiplayer && db) {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameState', ROOM_ID);
                    await updateDoc(roomRef, { drawnIds: globalDrawnIds });
                }

                setTimeout(() => {
                    cardContainer.classList.remove('suspense-active');
                    stopSuspenseSound(); 
                    
                    currentCard = nextCard;
                    renderCardContent();
                    
                    isFlipped = true; 
                    updateCardTransform();
                    
                    playRevealSound(); 
                    spawnFloatingIcon(nextCard.category); 

                    setTimeout(() => {
                        isAnimating = false;
                        refreshIcon.classList.remove('animate-spin');
                        nextBtn.classList.remove('opacity-50');
                    }, 800);
                }, 1200); 
            };

            if (isFlipped) {
                isFlipped = false;
                updateCardTransform();
                setTimeout(performFlipSequence, 800); 
            } else {
                performFlipSequence();
            }
        }

        function flipCard() {
            initAudio(); 
            if (isAnimating) return;
            if (!isFlipped && !currentCard) {
                drawRandomCard();
                return;
            }
            if (!isFlipped) {
                isFlipped = true;
                updateCardTransform();
                playRevealSound();
            } else {
                playClickSound();
            }
        }

        function updateCardTransform() {
            if (isFlipped) {
                cardWrapper.classList.add('rotate-y-180');
            } else {
                cardWrapper.classList.remove('rotate-y-180');
            }
        }

        function renderCardContent() {
            if (!currentCard) return;
            
            cardFront.innerHTML = `
                <div class="w-16 h-16 rounded-full bg-orange-100 flex items-center justify-center mb-4 shadow-sm border border-orange-200">
                    <svg class="w-8 h-8 text-orange-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h4v10h-10z"/></svg>
                </div>

                <div class="flex-1 flex items-center justify-center">
                    <h2 class="text-2xl font-bold text-gray-800 leading-snug">
                        "${currentCard.question}"
                    </h2>
                </div>

                <div class="w-full flex justify-between mt-6 opacity-20">
                    <svg class="w-6 h-6 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
                    <svg class="w-6 h-6 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
